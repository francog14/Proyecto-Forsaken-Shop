<header class="topbar" [class.is-scrolled]="scrolled()" [class.menu-open]="menuAbierto()">
  <a class="brand" [routerLink]="actor() === 'admin' ? '/admin' : actor() === 'vendedor' ? '/vendedor' : actor() === 'bodeguero' ? '/bodega' : '/tienda'" aria-label="Ir al inicio de Forsaken Shop" (click)="cerrarMenu()">
    <span class="brand-mark">FS</span>
    <span class="brand-text">Forsaken Shop</span>
  </a>

  <button class="menu-toggle" type="button" aria-label="Abrir o cerrar menu" [attr.aria-expanded]="menuAbierto()" (click)="alternarMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="nav-links" aria-label="Principal">
    @for (link of linksVisibles(); track link.path) {
      <a [routerLink]="link.path" routerLinkActive="active" (click)="cerrarMenu()">
        {{ link.label }}
      </a>
    }
  </nav>

  @if (session()) {
    <div class="session-box">
      <strong>{{ session()?.nombre }}</strong>
      <button type="button" (click)="logout()">Salir</button>
    </div>
  } @else {
    <a class="login-link" routerLink="/login" (click)="cerrarMenu()">Iniciar sesion</a>
  }
</header>
